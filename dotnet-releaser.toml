# Disable default packs — only publish NuGet packages + GitHub Release changelog.
# No cross-platform standalone binaries (zip/deb/rpm/tar.gz).
profile = "custom"

[msbuild]
project = "Metano.slnx"

[github]
user = "danfma"
repo = "metano"

[nuget]
source = "https://api.nuget.org/v3/index.json"

# Tests are run by the CI workflow (TUnit via `dotnet run`, not VSTest).
# dotnet-releaser does not support Microsoft.Testing.Platform yet.
[test]
enable = false

# Coverage is not yet supported for Testing Platform (TUnit) projects.
[coverage]
enable = false
