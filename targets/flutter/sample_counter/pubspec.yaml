name: sample_counter
description: >-
  Flutter consumer for the SampleCounter C# project. The Counter model,
  ICounterView interface and CounterPresenter class in `lib/sample_counter/`
  are all generated by the Metano Dart target (`metano-dart`) from the same
  C# source that drives `targets/js/sample-counter`.
publish_to: 'none'

version: 0.1.0

environment:
  sdk: ^3.5.0
  flutter: ^3.24.0

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
