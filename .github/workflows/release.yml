name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write # Required for npm Trusted Publishing (OIDC)

jobs:
  release:
    name: Build, Publish & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      # Trusted Publishing requires npm >= 11.5.1, which ships with Node 24.
      # No token is needed — the npm CLI detects the OIDC environment.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2

      - name: Restore tools
        run: dotnet tool restore

      # .NET: build, pack, publish NuGet, create GitHub Release + changelog
      # (tests are disabled in dotnet-releaser.toml; CI runs them separately)
      - name: dotnet-releaser
        run: |
          dotnet dotnet-releaser run \
            --nuget-token "${{ secrets.NUGET_TOKEN }}" \
            --github-token "${{ secrets.GITHUB_TOKEN }}" \
            dotnet-releaser.toml

      # Build the npm package before publishing
      - name: Build metano-runtime
        run: |
          bun install
          cd js/metano-runtime && bun run build

      # Sync version from the tag and publish to npm via Trusted Publishing.
      # No NPM_TOKEN — the npm CLI uses the OIDC token from id-token: write.
      - name: Publish metano-runtime to npm
        run: bash scripts/sync-npm-version.sh
